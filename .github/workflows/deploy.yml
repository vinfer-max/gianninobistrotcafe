name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Transform to Vite SPA and Build
        run: |
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Giannino Bistrot Cafè</title>
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/src/main.tsx"></script>
            </body>
          </html>
          EOF
          
          cat <<EOF > src/main.tsx
          import { StrictMode } from 'react'
          import { createRoot } from 'react-dom/client'
          import { RouterProvider } from '@tanstack/react-router'
          import { getRouter } from './router'
          
          const router = getRouter()
          
          createRoot(document.getElementById('root')!).render(
            <StrictMode>
              <RouterProvider router={router} />
            </StrictMode>
          )
          EOF
          
          cat <<EOF > vite.config.ts
          import { defineConfig } from "vite";
          import react from "@vitejs/plugin-react";
          import tailwindcss from "@tailwindcss/vite";
          import { TanStackRouterVite } from "@tanstack/router-plugin/vite";
          import tsConfigPaths from "vite-tsconfig-paths";
          
          export default defineConfig({
            base: "/gianninobistrotcafe/",
            plugins: [
              tsConfigPaths({ projects: ["./tsconfig.json"] }),
              TanStackRouterVite(),
              react(),
              tailwindcss(),
            ],
            build: {
              outDir: "dist",
            },
          });
          EOF
          
          sed -i 's/<html lang="en">/<div className="app-root">/g' src/routes/__root.tsx
          sed -i 's/<\/html>/<\/div>/g' src/routes/__root.tsx
          sed -i 's/<head>/<div className="head-content" style={{display: "none"}}>/g' src/routes/__root.tsx
          sed -i 's/<\/head>/<\/div>/g' src/routes/__root.tsx
          sed -i 's/<body>/<div className="body-content">/g' src/routes/__root.tsx
          sed -i 's/<\/body>/<\/div>/g' src/routes/__root.tsx
          
          npm run build

      - name: Prepare Artifact
        run: |
          CP_PATH="dist"
          echo "DEPLOY_PATH=$CP_PATH" >> $GITHUB_ENV
          touch ./$CP_PATH/.nojekyll
          cp ./$CP_PATH/index.html ./$CP_PATH/404.html

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./${{ env.DEPLOY_PATH }}

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
