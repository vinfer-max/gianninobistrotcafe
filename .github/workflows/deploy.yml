name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Debug Output
        run: |
          echo "Listing root directory:"
          ls -F
          echo "Searching for index.html:"
          find . -name "index.html"

      - name: Prepare Artifact
        run: |
          # Try to find where index.html is
          if [ -f ".output/public/index.html" ]; then
            CP_PATH=".output/public"
          elif [ -f "dist/index.html" ]; then
            CP_PATH="dist"
          elif [ -f "dist/client/index.html" ]; then
            CP_PATH="dist/client"
          else
            # If not found, create a dummy or fail
            echo "index.html not found! Creating a placeholder for debugging."
            mkdir -p dist
            echo "<html><body><h1>Build failed to generate index.html</h1><p>Check the logs.</p></body></html>" > dist/index.html
            CP_PATH="dist"
          fi
          
          echo "DEPLOY_PATH=$CP_PATH" >> $GITHUB_ENV
          touch ./$CP_PATH/.nojekyll
          # Copy index.html to 404.html for SPA routing
          cp ./$CP_PATH/index.html ./$CP_PATH/404.html

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./${{ env.DEPLOY_PATH }}

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
